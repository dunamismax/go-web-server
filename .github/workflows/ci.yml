name: Go CI

env:
  GO_VERSION: '1.26.1'
  BUN_VERSION: '1.3.10'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Install Dependencies
        run: mage setup

      - name: Generate Code
        run: mage generate

      - name: Verify Generated Artifacts Are Current
        run: git diff --exit-code

      - name: Install Frontend Dependencies
        run: mage frontendInstall

      - name: Install Playwright Browser
        run: cd web && bunx playwright install --with-deps chromium

      - name: Run Frontend Check
        run: mage frontendCheck

      - name: Run Frontend Build
        run: mage frontendBuild

      - name: Run Frontend E2E
        run: mage frontendE2E

      - name: Run Linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
          install-mode: goinstall

      - name: Run go vet
        run: go vet ./...

      - name: Run Tests
        run: go test ./...

      - name: Run Vulnerability Check
        run: mage vulnCheck

      - name: Run Build
        run: go build ./...

      - name: Run Frontend Browser Smoke Check
        run: ./scripts/frontend-smoke.sh

      - name: Run Runtime Smoke Check
        run: ./scripts/runtime-smoke.sh
